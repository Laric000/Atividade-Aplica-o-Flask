{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="card">

    <h2>Login</h2>

    <form method="POST">

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Entrar
        </button>

    </form>

</div>

{% endblock %}
