{% extends "base.html" %}

{% block title %}{% if modo_edicao %}Editar Agendamento{% else %}Novo Agendamento{% endif %}{% endblock %}

{% block content %}
<div class="card form-card">
    <h2>{% if modo_edicao %}Editar agendamento{% else %}Novo agendamento{% endif %}</h2>

    <form method="POST">
        <div class="form-group">
            <label for="nome_pet">Nome do pet</label>
            <input id="nome_pet" type="text" name="nome_pet" value="{{ dados.nome_pet or '' }}" required>
        </div>

        <div class="form-group">
            <label for="nascimento">Data de nascimento</label>
            <input id="nascimento" type="date" name="nascimento" value="{{ dados.nascimento or '' }}" required>
        </div>

        <div class="form-group">
            <label for="tutor">Nome do tutor(a)</label>
            <input id="tutor" type="text" name="tutor" value="{{ dados.tutor or '' }}" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail do tutor(a)</label>
            <input id="email" type="email" name="email" value="{{ dados.email or '' }}" required>
        </div>

        <div class="form-group">
            <label for="contato">Contato</label>
            <input id="contato" type="tel" name="contato" value="{{ dados.contato or '' }}" required>
        </div>

        <div class="form-group">
            <label for="endereco">Endereço</label>
            <input id="endereco" type="text" name="endereco" value="{{ dados.endereco or '' }}" required>
        </div>

        <div class="form-group">
            <label for="bairro">Bairro</label>
            <input id="bairro" type="text" name="bairro" value="{{ dados.bairro or '' }}" required>
        </div>

        <div class="form-group">
            <label for="servico">Serviço</label>
            <select id="servico" name="servico" required>
                <option value="">Selecione</option>
                <option value="Banho e Tosa" {% if dados.servico == 'Banho e Tosa' %}selected{% endif %}>Banho e Tosa</option>
                <option value="Vacinação" {% if dados.servico == 'Vacinação' %}selected{% endif %}>Vacinação</option>
                <option value="Consulta" {% if dados.servico == 'Consulta' %}selected{% endif %}>Consulta</option>
            </select>
        </div>

        <button class="btn btn-primary" type="submit">
            {% if modo_edicao %}Salvar alterações{% else %}Salvar agendamento{% endif %}
        </button>
        <a class="btn btn-secondary" href="{{ url_for('agendamentos_listar') }}">Cancelar</a>
    </form>
</div>
{% endblock %}
