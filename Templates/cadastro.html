{% extends "base.html" %}

{% block title %}{% if modo_edicao %}Editar Agendamento{% else %}Novo Agendamento{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if modo_edicao %}Editar Agendamento{% else %}Cadastro de Pet{% endif %}</h2>

    <form method="POST">
        <div class="form-group">
            <label for="nome_pet">Nome do pet</label>
            <input id="nome_pet" type="text" name="nome_pet" value="{{ agendamento.nome_pet or '' }}" required>
        </div>

        <div class="form-group">
            <label for="nascimento">Data de nascimento</label>
            <input id="nascimento" type="date" name="nascimento" value="{{ agendamento.nascimento or '' }}" required>
        </div>

        <div class="form-group">
            <label for="tutor">Nome do tutor(a)</label>
            <input id="tutor" type="text" name="tutor" value="{{ agendamento.tutor or '' }}" required>
        </div>

        <div class="form-group">
            <label for="email">Email do tutor(a)</label>
            <input id="email" type="email" name="email" value="{{ agendamento.email or '' }}" required>
        </div>

        <div class="form-group">
            <label for="contato">Contato</label>
            <input id="contato" type="tel" name="contato" value="{{ agendamento.contato or '' }}" required>
        </div>

        <div class="form-group">
            <label for="endereco">Endereco</label>
            <input id="endereco" type="text" name="endereco" value="{{ agendamento.endereco or '' }}" required>
        </div>

        <div class="form-group">
            <label for="bairro">Bairro</label>
            <input id="bairro" type="text" name="bairro" value="{{ agendamento.bairro or '' }}" required>
        </div>

        <div class="form-group">
            <label for="servico">Servico</label>
            <select id="servico" name="servico" required>
                <option value="">Selecione</option>
                <option value="Banho e Tosa" {% if agendamento.servico == 'Banho e Tosa' %}selected{% endif %}>Banho e Tosa</option>
                <option value="Vacinacao" {% if agendamento.servico == 'Vacinacao' %}selected{% endif %}>Vacinacao</option>
                <option value="Consulta" {% if agendamento.servico == 'Consulta' %}selected{% endif %}>Consulta</option>
            </select>
        </div>

        <button class="btn btn-primary" type="submit">{% if modo_edicao %}Salvar alteracoes{% else %}Salvar cadastro{% endif %}</button>
    </form>
</div>
{% endblock %}
