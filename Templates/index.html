{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}
<div class="card">
    <h2>Bem-vindo ao Sistema de Agendamentos</h2>
    <p>Gerencie os agendamentos do seu pet de forma simples e organizada.</p>
    {% if g.usuario %}
        <a class="btn btn-primary" href="{{ url_for('agendamentos_listar') }}">Ir para agendamentos</a>
    {% else %}
        <a class="btn btn-primary" href="{{ url_for('login') }}">Fazer login</a>
        <a class="btn btn-warning" href="{{ url_for('cadastro_usuario') }}">Cadastrar usuario</a>
    {% endif %}
</div>
{% endblock %}
