{% extends 'base.html' %}

{% block title %}Pagina Inicial{% endblock %}

{% block content %}
<h1>Cadastro de Pets</h1>
<p>Gerencie os agendamentos do seu pet em um so lugar.</p>
{% if g.usuario %}
    <a href="{{ url_for('agendamentos_listar') }}">Ir para agendamentos</a>
{% else %}
    <a href="{{ url_for('login') }}">Fazer login</a>
    <a href="{{ url_for('cadastro_usuario') }}">Cadastrar usuario</a>
{% endif %}
{% endblock %}
