{% extends "base.html" %}

{% block title %}Cadastro de usuário{% endblock %}

{% block content %}
<div class="card form-card">
    <h2>Cadastro de usuário</h2>

    <form action="{{ url_for('cadastro_usuario') }}" method="POST">
        <div class="form-group">
            <label for="usuario">Usuário</label>
            <input id="usuario" type="text" name="usuario" value="{{ usuario }}" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input id="senha" type="password" name="senha" minlength="4" required>
            <small>Use pelo menos 4 caracteres.</small>
        </div>

        <button class="btn btn-primary" type="submit">Salvar</button>
    </form>
</div>
{% endblock %}
