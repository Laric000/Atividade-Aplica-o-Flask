{% extends "base.html" %}

{% block title %}
Novo agendamento
{% endblock %}

{% block content %}

<div class="card">

    <h2>Novo agendamento</h2>

    <form method="POST">

        <div class="form-group">
            <label>Cliente</label>
            <input type="text" name="cliente" required>
        </div>

        <div class="form-group">
            <label>Data</label>
            <input type="date" name="data" required>
        </div>

        <div class="form-group">
            <label>Horário</label>
            <input type="time" name="horario" required>
        </div>

        <button class="btn btn-primary">
            Salvar
        </button>

        <a href="{{ url_for('agendamentos') }}"
           class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
